<title>فروشگاه دگمه | راه‌های ارتباط</title>
<meta name="theme-color" content="#0f132f">
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@500;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Vazirmatn',Tahoma,system-ui,-apple-system,sans-serif;
  background:#0b1028;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  min-height:100%;
}
a{color:inherit;text-decoration:none}
.page{
  min-height:100dvh;
  background:
    radial-gradient(480px 320px at 85% 8%, rgba(124,92,231,.11), transparent 65%),
    radial-gradient(380px 280px at 12% 90%, rgba(0,206,201,.06), transparent 65%),
    linear-gradient(170deg,#0f122b 0%, #151a3f 28%, #15264a 62%, #123356 100%);
}
.wrap{
  max-width:440px;
  margin:0 auto;
  padding:34px 20px 36px;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:stretch;
}
.head{text-align:center;margin-bottom:22px}
.logo{
  width:156px;height:156px;
  margin:0 auto;
  border-radius:50%;
  border:3px solid rgba(124,92,231,.45);
  box-shadow:0 8px 34px rgba(0,0,0,.5),0 0 30px rgba(124,92,231,.18);
  background:#fff;
  overflow:hidden;
  position:relative;
}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
h1{font-size:32px;font-weight:900;margin-top:13px;text-shadow:0 0 24px rgba(124,92,231,.45)}
.sub{color:#9da9d6;font-size:14.5px;margin-top:4px;opacity:.92}
.title{text-align:center;margin:24px 0 24px}
.title span{font-size:21px;font-weight:700;color:#c9d2ff}
.title .bar{width:84px;height:3px;background:linear-gradient(90deg,#7c5ce7,#ff6aa7);border-radius:3px;margin:10px auto 0}
.links{display:flex;flex-direction:column;gap:14px;width:100%}
.btn{
  display:flex;align-items:center;padding:16px;border-radius:18px;
  color:#fff;gap:13px;text-decoration:none;position:relative;
  transition:transform .1s ease;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(3px)}
.bicon{
  width:52px;height:52px;border-radius:13px;
  background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;order:1;overflow:hidden;
}
.bicon svg{width:26px;height:26px;fill:#fff;display:block}
.bicon img{width:100%;height:100%;object-fit:cover;display:block}
.btext{flex:1;text-align:right;order:2}
.bname{font-weight:800;font-size:17.5px}
.bsub{font-size:13px;color:rgba(255,255,255,.78);margin-top:2px;direction:ltr;text-align:right}
.barrow{opacity:.45;flex-shrink:0;order:3}
.barrow svg{width:18px;height:18px;fill:#fff;transform:scaleX(-1)}
.ig{background:linear-gradient(180deg,#ef4b84,#c5358a 42%,#7b35ba 100%);box-shadow:0 5px 0 #6a1d60,0 7px 22px rgba(193,53,132,.30),inset 0 1px 0 rgba(255,255,255,.16)}
.rb{background:linear-gradient(180deg,#f05b48,#c93b2b);box-shadow:0 5px 0 #96271c,0 7px 22px rgba(220,56,40,.28),inset 0 1px 0 rgba(255,255,255,.14)}
.wa{background:linear-gradient(180deg,#2fd56d,#24a84f);box-shadow:0 5px 0 #16763a,0 7px 22px rgba(37,167,79,.30),inset 0 1px 0 rgba(255,255,255,.15)}
.ph{background:linear-gradient(180deg,#3ca8f5,#2478c2);box-shadow:0 5px 0 #155484,0 7px 22px rgba(35,120,196,.28),inset 0 1px 0 rgba(255,255,255,.15)}
.foot{margin-top:auto;padding-top:28px;text-align:center}
.foot-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);margin:0 auto 9px}
.foot-t{font-size:11.5px;color:rgba(255,255,255,.3);line-height:1.9}
@media(min-width:480px){.logo{width:168px;height:168px}h1{font-size:36px}}
</style>
</head>
